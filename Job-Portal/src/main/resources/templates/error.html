<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Error — Job Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<header th:replace="~{fragments :: siteHeader}"></header>
<main>
    <h1 th:text="${status} ?: 'Error'">Error</h1>
    <p th:text="${message} ?: 'Something went wrong.'"></p>
    <p><a th:href="@{/}">Home</a></p>
</main>
<footer th:replace="~{fragments :: siteFooter}"></footer>
</body>
</html>
