<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Login — Job Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<header th:replace="~{fragments :: siteHeader}"></header>
<main>
    <h1>Login</h1>
    <div class="alert alert--success" th:if="${param.registered != null}">
        Registration successful. Sign in with your email and password.
    </div>
    <div class="alert alert--error" th:if="${param.error != null}">
        Invalid email or password.
    </div>
    <div class="card" style="max-width:32rem; margin: 0 auto;">
        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-group">
                <label for="username">Email</label>
                <input id="username" name="username" type="email" autocomplete="username" required/>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required/>
            </div>
            <button class="btn btn--primary" type="submit">Login</button>
        </form>
        <p class="muted" style="margin-top:1rem;">New here? <a th:href="@{/register}">Create an account</a></p>
    </div>
</main>
<footer th:replace="~{fragments :: siteFooter}"></footer>
</body>
</html>
