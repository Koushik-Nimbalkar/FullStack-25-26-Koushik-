<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>My applications — Job Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<header th:replace="~{fragments :: siteHeader}"></header>
<main>
    <h1>Application status</h1>
    <div class="card" style="overflow-x:auto;">
        <table th:if="${!applications.isEmpty()}">
            <thead>
            <tr>
                <th>Job</th>
                <th>Location</th>
                <th>Applied</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="a : ${applications}">
                <td><a th:href="@{/jobs/{id}(id=${a.job.id})}" th:text="${a.job.title}">Job</a></td>
                <td th:text="${a.job.location}">City</td>
                <td th:text="${T(java.time.format.DateTimeFormatter).ofPattern('dd MMM yyyy').withZone(T(java.time.ZoneId).systemDefault()).format(a.appliedAt)}">
                    date
                </td>
                <td>
                    <span class="badge"
                          th:classappend="${a.status.name() == 'PENDING'} ? ' badge--pending' : (${a.status.name() == 'SHORTLISTED'} ? ' badge--shortlist' : ' badge--reject')"
                          th:text="${a.status.name()}">PENDING</span>
                </td>
                <td>
                    <form th:action="@{/student/applications/{id}/withdraw(id=${a.id})}" method="post" style="display:inline;" onsubmit="return confirm('Are you sure you want to withdraw this application?');">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn--danger" style="padding: 4px 8px; font-size: 12px;">Withdraw</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
        <p th:if="${applications.isEmpty()}" class="muted">No applications yet.</p>
    </div>
</main>
<footer th:replace="~{fragments :: siteFooter}"></footer>
</body>
</html>
