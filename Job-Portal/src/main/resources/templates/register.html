<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Register — Job Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<header th:replace="~{fragments :: siteHeader}"></header>
<main>
    <h1>Create account</h1>
    <div class="card" style="max-width:32rem; margin: 0 auto;">
        <form th:action="@{/register}" th:object="${registerForm}" method="post" autocomplete="off">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="alert alert--error" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" th:field="*{email}" type="email" required/>
                <span class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </div>
            <div class="form-group">
                <label for="password">Password (min 8 characters)</label>
                <input id="password" th:field="*{password}" type="password" required/>
                <span class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
            </div>
            <div class="form-group">
                <label for="fullName">Full name</label>
                <input id="fullName" th:field="*{fullName}" placeholder="Enter ur name" required/>
                <span class="error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></span>
            </div>
            <div class="form-group">
                <label for="phone">Mobile (optional)</label>
                <input id="phone" th:field="*{phone}" placeholder="Optional"/>
            </div>
            <div class="form-group">
                <label for="role">I am a</label>
                <select id="role" th:field="*{role}" required>
                    <option value="" disabled th:selected="${registerForm.role == null}">Select…</option>
                    <option value="STUDENT">Student / job seeker</option>
                    <option value="EMPLOYER">Employer / recruiter</option>
                </select>
                <span class="error" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></span>
            </div>
            <div class="form-group">
                <label for="companyName">Company name (employers only)</label>
                <input id="companyName" th:field="*{companyName}" placeholder="e.g. Acme Inc."/>
            </div>
            <button class="btn btn--primary" type="submit">Register</button>
        </form>
        <p class="muted" style="margin-top:1rem;">Already registered? <a th:href="@{/login}">Login</a></p>
    </div>
</main>
<footer th:replace="~{fragments :: siteFooter}"></footer>
</body>
</html>
