<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Browse jobs — Job Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<header th:replace="~{fragments :: siteHeader}"></header>
<main>
    <h1>Open positions</h1>
    <p class="muted">Filter by category, city, or maximum experience required (server-side). Refine the table instantly with the search box (client-side).</p>

    <form class="filters card" method="get" th:action="@{/jobs}">
        <div class="form-group">
            <label for="category">Category</label>
            <select id="category" name="category">
                <option value="">All</option>
                <option th:each="c : ${categories}" th:value="${c.name()}"
                        th:selected="${selectedCategory != null && selectedCategory == c}"
                        th:text="${#strings.replace(c.name(), '_', ' ')}">IT</option>
            </select>
        </div>
        <div class="form-group">
            <label for="location">Location</label>
            <input id="location" name="location" type="search" placeholder="e.g. Seattle"
                   th:value="${selectedLocation}"/>
        </div>
        <div class="form-group">
            <label for="maxExperienceYears">Max exp. required (years)</label>
            <input id="maxExperienceYears" name="maxExperienceYears" type="number" min="0" max="40"
                   th:value="${selectedMaxExp}" placeholder="e.g. 5"/>
        </div>
        <button class="btn btn--primary" type="submit">Apply filters</button>
    </form>

    <div class="form-group" style="margin-top:1rem;">
        <label for="tableFilter">Quick search (this page)</label>
        <input id="tableFilter" type="search" placeholder="Type to filter rows…" autocomplete="off"/>
    </div>

    <div class="card" style="overflow-x:auto;">
        <table id="jobsTable">
            <thead>
            <tr>
                <th>Role</th>
                <th>Company</th>
                <th>Location</th>
                <th>Salary (annual)</th>
                <th>Min exp.</th>
                <th>Category</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="job : ${jobs}"
                th:attr="data-category=${job.category.name()}, data-location=${job.location}, data-exp=${job.minExperienceYears}">
                <td><a th:href="@{/jobs/{id}(id=${job.id})}" th:text="${job.title}">Title</a></td>
                <td th:text="${job.employer.companyName != null ? job.employer.companyName : job.employer.fullName}">
                    Co
                </td>
                <td th:text="${job.location}">City</td>
                <td th:text="${T(com.jobportal.util.SalaryFormat).formatRange(job.salaryMin, job.salaryMax)}">$</td>
                <td th:text="${job.minExperienceYears} + ' yr'">0</td>
                <td th:text="${#strings.replace(job.category.name(), '_', ' ')}">IT</td>
            </tr>
            </tbody>
        </table>
        <p th:if="${#lists.isEmpty(jobs)}" class="muted">No jobs match your filters.</p>
    </div>
</main>
<footer th:replace="~{fragments :: siteFooter}"></footer>
<script defer th:src="@{/js/jobs-filter.js}"></script>
</body>
</html>
