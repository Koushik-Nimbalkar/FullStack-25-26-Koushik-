<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${job.title} + ' — Job Portal'">Job</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<header th:replace="~{fragments :: siteHeader}"></header>
<main>
    <article class="card">
        <h1 th:text="${job.title}">Title</h1>
        <p class="muted"
           th:text="${job.employer.companyName != null ? job.employer.companyName : job.employer.fullName}">
            Company</p>
        <p class="job-meta">
            <span th:text="${job.location}"></span>
            ·
            <span th:text="${T(com.jobportal.util.SalaryFormat).format(job.salaryMin)}"></span>
            –
            <span th:text="${T(com.jobportal.util.SalaryFormat).format(job.salaryMax)}"></span>
            per year
            ·
            <span th:text="${job.minExperienceYears} + ' yr minimum experience'"></span>
        </p>
        
        <div style="margin: 1rem 0;">
            <iframe width="100%" height="250" style="border:0; border-radius: 8px;" loading="lazy" allowfullscreen
                    th:src="@{'https://maps.google.com/maps?q=' + ${job.location} + '&output=embed'}">
            </iframe>
        </div>
        <h3>Skills</h3>
        <p th:text="${job.skillsRequired}"></p>
        <h3>Description</h3>
        <p style="white-space:pre-wrap;" th:text="${job.description}"></p>

        <div class="alert alert--success" th:if="${message != null}" th:text="${message}"></div>
        <div class="alert alert--error" th:if="${error != null}" th:text="${error}"></div>

        <div sec:authorize="hasRole('STUDENT')">
            <form th:action="@{/student/jobs/{id}/apply(id=${job.id})}" method="post" style="margin-top:1rem;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn--primary" type="submit">Apply for this job</button>
            </form>
            <p class="muted" style="margin-top:0.5rem;">Upload your resume from your profile before applying.</p>
        </div>
        <p sec:authorize="!isAuthenticated()" class="muted">
            <a th:href="@{/login}">Login</a> as a student to apply online.
        </p>
        <p sec:authorize="isAuthenticated() && !hasRole('STUDENT')" class="muted">Only student accounts can apply.</p>
    </article>
    <p><a th:href="@{/jobs}">← Back to listings</a></p>
</main>
<footer th:replace="~{fragments :: siteFooter}"></footer>
</body>
</html>
