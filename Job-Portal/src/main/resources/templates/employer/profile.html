<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Company profile — Job Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<header th:replace="~{fragments :: siteHeader}"></header>
<main>
    <h1>Company profile</h1>
    <div class="alert alert--success" th:if="${param.saved != null}">Saved.</div>
    <div class="card" style="max-width:32rem;">
        <form th:action="@{/employer/profile}" th:object="${profileForm}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-group">
                <label for="fullName">Contact person</label>
                <input id="fullName" th:field="*{fullName}" placeholder="Enter ur name" required/>
            </div>
            <div class="form-group">
                <label for="companyName">Company name</label>
                <input id="companyName" th:field="*{companyName}" placeholder="Legal business name"/>
            </div>
            <div class="form-group">
                <label for="phone">Phone</label>
                <input id="phone" th:field="*{phone}"/>
            </div>
            <button class="btn btn--primary" type="submit">Save</button>
        </form>
        <p class="muted" style="margin-top:1rem;">Login email: <span th:text="${user.email}"></span></p>
    </div>
</main>
<footer th:replace="~{fragments :: siteFooter}"></footer>
</body>
</html>
