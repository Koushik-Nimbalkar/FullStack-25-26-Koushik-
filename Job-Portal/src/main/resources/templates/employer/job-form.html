<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${jobId != null} ? 'Edit job' : 'Post job'">Post job</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<header th:replace="~{fragments :: siteHeader}"></header>
<main>
    <h1 th:text="${jobId != null} ? 'Edit job' : 'Post a new job'">Post job</h1>
    <div class="card" style="max-width:40rem;">
        <form th:action="${jobId == null} ? @{/employer/jobs/new} : @{/employer/jobs/{id}/edit(id=${jobId})}"
              th:object="${jobForm}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <p class="error" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
            <div class="form-group">
                <label for="title">Job title</label>
                <input id="title" th:field="*{title}" required/>
                <span class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
            </div>
            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" th:field="*{category}" required>
                    <option value="" disabled th:selected="*{category == null}">Select category</option>
                    <option th:each="c : ${T(com.jobportal.model.JobCategory).values()}"
                            th:value="${c.name()}"
                            th:text="${#strings.replace(c.name(), '_', ' ')}">IT</option>
                </select>
            </div>
            <div class="form-group">
                <label for="location">Location (Click map to select)</label>
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <input id="location" th:field="*{location}" placeholder="e.g. Seattle, WA or click on map" required style="flex: 1;" />
                    <button type="button" class="btn btn--ghost" onclick="searchMapLocation()">Search</button>
                </div>
                <div id="mapPicker" style="width: 100%; height: 250px; border-radius: 8px; border: 1px solid var(--border); z-index: 1;"></div>
                <span class="error" th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></span>
                
                <!-- Leaflet resources -->
                <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
                <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
                <script>
                    document.addEventListener('DOMContentLoaded', function() {
                        var map = L.map('mapPicker').setView([20.5937, 78.9629], 4); // Default to India
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                            attribution: '&copy; OpenStreetMap contributors'
                        }).addTo(map);
                        
                        var marker = null;
                        
                        // If we already have a location, try to geocode it and show
                        var existingLoc = document.getElementById('location').value;
                        if(existingLoc) {
                            fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(existingLoc))
                                .then(res => res.json())
                                .then(data => {
                                    if(data && data.length > 0) {
                                        var lat = data[0].lat;
                                        var lon = data[0].lon;
                                        map.setView([lat, lon], 13);
                                        marker = L.marker([lat, lon]).addTo(map);
                                    }
                                });
                        }

                        map.on('click', function(e) {
                            var lat = e.latlng.lat;
                            var lng = e.latlng.lng;
                            if(marker) map.removeLayer(marker);
                            marker = L.marker([lat, lng]).addTo(map);
                            
                            // Reverse geocode to get city name
                            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
                                .then(res => res.json())
                                .then(data => {
                                    if(data && data.address) {
                                        var city = data.address.city || data.address.town || data.address.county || "Unknown";
                                        var state = data.address.state || "";
                                        document.getElementById('location').value = city + (state ? ", " + state : "");
                                    } else {
                                        document.getElementById('location').value = lat.toFixed(4) + "," + lng.toFixed(4);
                                    }
                                });
                        });
                        
                        window.searchMapLocation = function() {
                            var q = document.getElementById('location').value;
                            if(!q) return;
                            fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(q))
                                .then(res => res.json())
                                .then(data => {
                                    if(data && data.length > 0) {
                                        var lat = data[0].lat;
                                        var lon = data[0].lon;
                                        map.setView([lat, lon], 13);
                                        if(marker) map.removeLayer(marker);
                                        marker = L.marker([lat, lon]).addTo(map);
                                    } else {
                                        alert("Location not found on map.");
                                    }
                                });
                        };
                    });
                </script>
            </div>
            <div class="form-group">
                <label for="minExperienceYears">Minimum experience (years)</label>
                <input id="minExperienceYears" th:field="*{minExperienceYears}" type="number" min="0" max="40"
                       required/>
            </div>
            <div class="form-group">
                <label for="salaryMin">Minimum annual salary</label>
                <input id="salaryMin" th:field="*{salaryMin}" type="number" min="0" step="1000" required/>
                <span class="muted">Whole  per year, e.g. 95000</span>
                <span class="error" th:if="${#fields.hasErrors('salaryMin')}" th:errors="*{salaryMin}"></span>
            </div>
            <div class="form-group">
                <label for="salaryMax">Maximum annual salary</label>
                <input id="salaryMax" th:field="*{salaryMax}" type="number" min="0" step="1000" required/>
                <span class="error" th:if="${#fields.hasErrors('salaryMax')}" th:errors="*{salaryMax}"></span>
            </div>
            <div class="form-group">
                <label for="skillsRequired">Skills (comma-separated)</label>
                <textarea id="skillsRequired" th:field="*{skillsRequired}" required></textarea>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" th:field="*{description}" required style="min-height:180px;"></textarea>
            </div>
            <button class="btn btn--primary" type="submit" th:text="${jobId != null} ? 'Save changes' : 'Publish job'">
                Submit
            </button>
        </form>
    </div>
</main>
<footer th:replace="~{fragments :: siteFooter}"></footer>
</body>
</html>
